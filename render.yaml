services:
  # Python FastAPI Backend service
  - type: web
    name: inventory-management-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Run database migrations using alembic before startup
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-postgres-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        # Allow Vercel app domain matching and localhost
        value: '["https://*.vercel.app", "http://localhost:5173", "http://localhost:3000"]'

# Database instance
databases:
  - name: inventory-postgres-db
    plan: free
    postgresMajorVersion: 16
